name: Pre-Release Build

on:
  workflow_dispatch:
  push:
    branches-ignore: [ "main" ]
    tags: [ "*-pre-release" ]
  pull_request:
    branches-ignore: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Set build number
        run: echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Check if tagged commit is on main branch
        id: check_main_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin --prune
          if git branch -r --contains ${{ github.sha }} | grep -q "origin/main"; then
            echo "IS_ON_MAIN=true" >> $GITHUB_ENV
          else
            echo "IS_ON_MAIN=false" >> $GITHUB_ENV
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease generateManifest -PpreReleaseVersion=${{ env.RELEASE_VERSION }} --stacktrace --info 2>&1 | tail -100
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/release.keystore

      - name: Archive APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Pre-Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/') && env.IS_ON_MAIN == 'false'
        with:
          name: ${{ github.ref_name }}
          prerelease: true
          generateReleaseNotes: true
          artifacts: app/build/outputs/apk/release/app-release.apk, app/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
